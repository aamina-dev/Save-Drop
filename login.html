<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save-Drop &mdash; Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <!-- Background blobs (reuse body::before/after from CSS) -->

  <div class="auth-container">

    <!-- Brand -->
    <div class="auth-brand">
      <span class="auth-logo">&#128167;</span>
      <div>
        <h1>Save-Drop</h1>
        <p>Every Drop Matters</p>
      </div>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="showPanel('login')">Sign In</button>
      <button class="auth-tab"        id="tabSignup" onclick="showPanel('signup')">Sign Up</button>
    </div>

    <!--  LOGIN PANEL  -->
    <div class="auth-panel" id="panelLogin">
      <form id="loginForm" autocomplete="on">

        <div class="input-group">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">&#9993;</span>
            <input type="email" id="loginEmail" placeholder="you@example.com" required autofocus>
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" placeholder="Your password" required>
            <button type="button" class="eye-btn" id="eyeLogin" onclick="toggleEye('loginPassword','eyeLogin')" aria-label="Show password">
              <svg id="eyeLogin-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="auth-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <span class="forgot-link" onclick="showPanel('forgot')">Forgot password?</span>
        </div>

        <button type="submit" class="auth-btn" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="btn-spinner hidden"></span>
        </button>
        <p id="loginError" class="auth-msg auth-error"></p>
      </form>
    </div>

    <!--  SIGN UP PANEL  -->
    <div class="auth-panel hidden" id="panelSignup">
      <form id="signupForm" autocomplete="off">

        <div class="input-group">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">&#9993;</span>
            <input type="email" id="signupEmail" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="signupPassword" placeholder="Min 6 characters" required>
            <button type="button" class="eye-btn" id="eyeSignup" onclick="toggleEye('signupPassword','eyeSignup')" aria-label="Show password">
              <svg id="eyeSignup-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="signupConfirm" placeholder="Repeat password" required>
            <button type="button" class="eye-btn" id="eyeConfirm" onclick="toggleEye('signupConfirm','eyeConfirm')" aria-label="Show password">
              <svg id="eyeConfirm-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="signupBtn">
          <span id="signupBtnText">Create Account</span>
          <span id="signupSpinner" class="btn-spinner hidden"></span>
        </button>
        <p id="signupError" class="auth-msg auth-error"></p>
        <p id="signupSuccess" class="auth-msg auth-success"></p>
      </form>
    </div>

    <!--  FORGOT PASSWORD PANEL  -->
    <div class="auth-panel hidden" id="panelForgot">
      <div class="forgot-header">
        <button class="back-btn" onclick="showPanel('login')">&#8592; Back to Sign In</button>
        <p class="forgot-desc">Enter your email and we&rsquo;ll send you a reset link.</p>
      </div>
      <form id="forgotForm">
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">&#9993;</span>
            <input type="email" id="forgotEmail" placeholder="you@example.com" required>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="forgotBtn">
          <span id="forgotBtnText">Send Reset Link</span>
          <span id="forgotSpinner" class="btn-spinner hidden"></span>
        </button>
        <p id="forgotError"   class="auth-msg auth-error"></p>
        <p id="forgotSuccess" class="auth-msg auth-success"></p>
      </form>
    </div>

    <p class="auth-footer">Smart Water Monitoring &mdash; IoT Project</p>
  </div>

  <script>
    // Panel switcher
    function showPanel(name) {
      document.querySelectorAll(".auth-panel").forEach(p => p.classList.add("hidden"));
      document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
      document.getElementById("panel" + name.charAt(0).toUpperCase() + name.slice(1)).classList.remove("hidden");
      if (name === "login")  document.getElementById("tabLogin").classList.add("active");
      if (name === "signup") document.getElementById("tabSignup").classList.add("active");
    }

    // Show / hide password toggle
    const EYE_OPEN  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const EYE_SHUT  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    function toggleEye(inputId, btnId) {
      const inp = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      const showing = inp.type === "text";
      inp.type    = showing ? "password" : "text";
      btn.innerHTML = showing ? EYE_OPEN : EYE_SHUT;
    }


  </script>

  <script type="module" src="auth.js"></script>
</body>
</html>
